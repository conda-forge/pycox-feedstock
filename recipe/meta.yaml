{% set name = "pycox" %}
{% set version = "0.3.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 745859ecfa4097cf8e8aef06f08048a41b7b2254fcffb9fc9f8926b1f38b6b1b

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - feather-format >=0.4.0
    - h5py >=2.9.0
    - numba >=0.44
    - py7zr >=0.11.3
    - python >={{ python_min }}
    - requests >=2.22.0
    - scikit-learn >=0.21.2
    - torchtuples >=0.2.0

test:
  imports:
    - pycox
    - pycox.datasets
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/havakv/pycox
  summary: Survival analysis with PyTorch
  license: BSD-2-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - sarthakpati
